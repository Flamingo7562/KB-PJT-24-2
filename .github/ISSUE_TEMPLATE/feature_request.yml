name: 기능 개발
description: 새로운 사용자 기능 또는 화면/ API 개발을 등록합니다.
title: "feat: [AREA] "
labels: ["type: feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        기능 이슈 제목은 `feat: [AREA] 작업 요약` 형식으로 작성합니다.
        예시: `feat: [FE] 로그인 화면 구현`

        AREA tag: `[FE]`, `[BE]`, `[DB]`, `[COMMON]`, `[DOCS]`, `[GITHUB]`, `[INFRA]`

        기능 이슈는 구현 목적, 완료 기준, 기술 제약을 명확히 적습니다.
  - type: input
    id: summary
    attributes:
      label: 요약
      description: 한 문장으로 구현할 기능을 설명합니다.
      placeholder: 예) 사용자는 로그인 후 마이페이지로 이동할 수 있다.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - "[FE] Frontend"
        - "[BE] Backend"
        - "[DB] Database"
        - "[COMMON] Common"
        - "[DOCS] Docs"
        - "[GITHUB] GitHub"
        - "[INFRA] Infra"
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 배경 / 목적
      description: 왜 이 기능이 필요한지, 어떤 문제를 해결하는지 적습니다.
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: 요구사항
      description: 구현해야 하는 동작을 체크리스트로 작성합니다.
      value: |
        - [ ] 
        - [ ]
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: PR 머지 전 확인 가능한 기준을 적습니다.
      value: |
        - [ ] 사용자가 기대한 흐름을 화면 또는 API로 확인할 수 있다.
        - [ ] 예외 상황이 처리된다.
        - [ ] 관련 테스트 또는 수동 검증 결과를 남긴다.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 화면 설계, API 명세, 관련 이슈, 문서 링크가 있다면 적습니다.
  - type: input
    id: related-issues
    attributes:
      label: 관련 이슈
      description: GitHub 이슈 번호를 #12, #34 형식으로 적습니다.
      placeholder: "#12, #34"
  - type: checkboxes
    id: title-convention
    attributes:
      label: 제목 컨벤션 확인
      options:
        - label: "이슈 제목을 `feat: [AREA] 작업 요약` 형식으로 작성했습니다."
          required: true
